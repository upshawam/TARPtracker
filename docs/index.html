<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TARP Tracker Status</title>
  <style>
    :root {
      --bg: #f2f7f3;
      --card: #ffffff;
      --ink: #1f2a25;
      --muted: #4f6a5c;
      --accent: #1f7a55;
      --line: #d7e4db;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top right, #dff1e5 0%, var(--bg) 55%);
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .hero {
      background: linear-gradient(120deg, #1f7a55, #2a9d63);
      color: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(31, 122, 85, 0.2);
    }
    .grid {
      margin-top: 16px;
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
    }
    .label { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .value { font-size: 20px; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid var(--line); padding: 10px; text-align: left; vertical-align: top; }
    th { background: #f7fcf8; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Tennessee TARP Tracker</h1>
      <p>Automated monitor for TWRA participant data changes.</p>
    </section>

    <section class="grid">
      <div class="card"><div class="label">Latest Record Count</div><div class="value">9826</div></div>
      <div class="card"><div class="label">Last Checked (UTC)</div><div class="value" style="font-size:16px">2026-07-23T09:08:56Z</div></div>
      <div class="card"><div class="label">Last Change (UTC)</div><div class="value" style="font-size:16px">No detected changes yet</div></div>
      <div class="card"><div class="label">Source</div><div class="value" style="font-size:16px"><a href="https://www.tn.gov/twra/fishing/tennessee-angler-recognition-program/#summary">TWRA TARP Page</a></div></div>
    </section>

    <section class="card" style="margin-top: 16px;">
      <h2>Change History</h2>
      <table>
        <thead>
          <tr>
            <th>Changed At (UTC)</th>
            <th>Count</th>
            <th>Delta</th>
            <th>Added Rows</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="4">No changes recorded yet.</td></tr>
        </tbody>
      </table>
    </section>
  </div>
</body>
</html>
